services:

  database:
    image: postgres:18
    environment:
      POSTGRES_DB: upsa
      POSTGRES_USER: system
      POSTGRES_PASSWORD: manager
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - vol_database:/var/lib/postgresql
    ports:
      - 5555:5432
    command:
      - -c
      - max_prepared_transactions=100
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U system -d upsa" ]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: bitnami/redis
    environment:
      REDIS_PORT_NUMBER: 6379
      ALLOW_EMPTY_PASSWORD: no
      REDIS_PASSWORD: password
    ports:
      - 6379:6379

  flyway:
    image: flyway/flyway
    environment:
      FLYWAY_USER: system
      FLYWAY_PASSWORD: manager
      FLYWAY_URL: jdbc:postgresql://database:5432/upsa
      FLYWAY_LOCATIONS: filesystem:/flyway/locations/equipos,filesystem:/flyway/locations/jugadores,filesystem:/flyway/locations/contratos
    volumes:
      - ./ws-equipos/flyway:/flyway/locations/equipos
      - ./ws-jugadores/flyway:/flyway/locations/jugadores
      - ./ws-contratos/flyway:/flyway/locations/contratos
    command:
      - migrate
    depends_on:
      database:
        condition: service_healthy

  equipos:
    build:
      context: ./ws-equipos
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager
      REDIS_HOSTS: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: password
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/equipos/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 3s
      start_interval: 3s
    depends_on:
      flyway:
        condition: service_completed_successfully


  jugadores:
    build:
      context: ./ws-jugadores
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager
      REDIS_HOSTS: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: password
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/jugadores/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 3s
      start_interval: 3s
    depends_on:
      flyway:
        condition: service_completed_successfully


  contratos:
    build:
      context: ./ws-contratos
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager
      REDIS_HOSTS: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: password
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/contratos/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 3s
      start_interval: 3s
    depends_on:
      flyway:
        condition: service_completed_successfully
  aggregator:
    build:
      context: aggregator
      dockerfile: Dockerfile
    environment:
      SERVICE_EQUIPOS_URL: http://equipos:8080
      SERVICE_JUGADORES_URL: http://jugadores:8080
      SERVICE_CONTRATOS_URL: http://contratos:8080
      REDIS_HOSTS: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: password
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/contratos/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 3s
      start_interval: 3s
    depends_on:
      jugadores:
        condition: service_healthy
      equipos:
        condition: service_healthy
      contratos:
        condition: service_healthy


  nginx:
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    depends_on:
      aggregator:
        condition: service_healthy



volumes:
  vol_database: {}
