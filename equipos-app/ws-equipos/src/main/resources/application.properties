%dev.quarkus.http.port=8082

quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true

database.host=localhost
database.port=5432
database.name=upsa
database.username=system
database.password=manager

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${database.username}
quarkus.datasource.password=${database.password}
quarkus.datasource.jdbc.url=jdbc:postgresql://${database.host}:${database.port}/${database.name}

quarkus.index-dependency.shared-quarkus.artifact-id=shared-quarkus
quarkus.index-dependency.shared-quarkus.group-id=es.upsa.ssi

quarkus.smallrye-health.root-path=/equipos/health

quarkus.smallrye-openapi.path=/equipos/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/equipos/swagger-ui


redis.hosts=localhost
redis.port=6379
redis.password=password


quarkus.redis.hosts=redis://${redis.hosts}:${redis.port}
quarkus.redis.client-type=standalone
quarkus.redis.password=${redis.password}

quarkus.cache.redis."equipos".key-type=java.lang.String
quarkus.cache.redis."equipos".value-type=java.lang.String